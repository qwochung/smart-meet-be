spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Ho_Chi_Minh
        format_sql: false

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 90000000           # 15 minutes
    refresh-expiration-ms: 60480000000 # 7 days
  client-url: http://localhost:5000
  room:
    max-participants: 10
    max-active-rooms: 5
    duration-minutes: 60
  storage:
    provider: s3                   # s3 | local

    s3:
      bucket-name: ${S3_BUCKET}         # tên bucket, khai báo trong .env
      region: ${S3_REGION:ap-southeast-1}   # Singapore (gần Việt Nam)
      access-key: ${S3_ACCESS_KEY}
      secret-key: ${S3_SECRET_KEY}
      prefix: rooms                # folder prefix trong bucket: rooms/{roomCode}/...
      presign-expiry-minutes: 15   # presigned URL hết hạn sau 15 phút

    upload:
      max-files-per-room: 5
      max-file-size-mb: 50


livekit:
  api-key: ${LIVEKIT_API_KEY}
  api-secret: ${LIVEKIT_API_SECRET}
  host: ${LIVEKIT_URL}

logging:
  level:
    org.hibernate: ERROR
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql: OFF
    org.hibernate.orm.connections.pooling: ERROR
    
server:
  servlet:
    context-path: /api