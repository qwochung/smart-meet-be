spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    mongodb:
      uri: mongodb+srv://${MONGODB_USERNAME}:${MONGODB_PASSWORD}@${MONGODB_HOST}/${MONGODB_DATABASE:smart_meet}?authSource=admin&retryWrites=true&w=majority&appName=SmartMeet
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Ho_Chi_Minh
        format_sql: false

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 90000000           # 15 minutes
    refresh-expiration-ms: 60480000000 # 7 days
  client-url: ${CLIENT_URL:http://localhost:5555}
#  client-url: http://localhost:63342  => Nếu test bằng html thì tắt cái dòng có port 5555, mở dòng này ra
  room:
    max-participants: 10
    max-active-rooms: 5
    duration-minutes: 60
  storage:
    provider: s3                   # s3 | local

    s3:
      bucket-name: ${S3_BUCKET}         # tên bucket, khai báo trong .env
      region: ${S3_REGION:ap-southeast-1}   # Singapore (gần Việt Nam)
      access-key: ${S3_ACCESS_KEY}
      secret-key: ${S3_SECRET_KEY}
      prefix: rooms                # folder prefix trong bucket: rooms/{roomCode}/...
      presign-expiry-minutes: 15   # presigned URL hết hạn sau 15 phút

    upload:
      max-files-per-room: 5
      max-file-size-mb: 50


livekit:
  api-key: ${LIVEKIT_API_KEY}
  api-secret: ${LIVEKIT_API_SECRET}
  host: ${LIVEKIT_URL}

ai-server:
  transcribe-url: ${AI_SERVER_TRANSCRIBE_URL:http://localhost:8000/api/transcribe/chunk}
  token: ${AI_SERVER_TOKEN:}

gemini:
  api-key: ${GEMINI_API_KEY}
  prompt: "${GEMINI_PROMPT:Bạn là một trợ lý biên tập chuyên nghiệp. Hãy hiệu đính, sửa các lỗi chính tả, các từ bị nhận dạng sai và làm mượt biên bản cuộc họp thô dưới đây. Yêu cầu nghiêm ngặt: 1. Giữ nguyên định dạng hội thoại '[Tên]: Nội dung phát biểu' và giữ nguyên tên người nói. 2. Không thay đổi ý nghĩa gốc hoặc thêm bớt thông tin. 3. TUYỆT ĐỐI KHÔNG viết thêm bất kỳ câu dẫn dắt nào (như 'Dưới đây là...'), lời chào hay ghi chú. Chỉ trả về duy nhất nội dung hội thoại đã được làm mịn.}"

transcript:
  merge:
    debounce-ms: 200
    gap-threshold-ms: 2000
    out-of-order-timeout-ms: 3000
    snapshot-interval-ms: 30000
    snapshot-every-n-versions: 10
    state-expire-minutes: 30

logging:
  level:
    org.hibernate: ERROR
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql: OFF
    org.hibernate.orm.connections.pooling: ERROR
    
server:
  servlet:
    context-path: /api